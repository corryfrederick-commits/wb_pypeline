version: 2

models:
  - name: stg_orders_current_from_raw
    description: "dbt staging-модель заказов WB. Парсит orders[] из quarantine.v_raw_payloads_schema_passed. Одна строка = один заказ из raw JSON."
    columns:
      - name: raw_payload_id
        description: "ID raw payload из landing.raw_payloads. Нужен для трассировки строки к исходному JSON."
      - name: source_system
        description: "Источник данных, например wb_mock."
      - name: dataset_name
        description: "Имя датасета, из которого пришёл заказ: orders_fbs_new, orders_dbs_completed и т.д."
      - name: source_file
        description: "Имя исходного JSON-файла."
      - name: source_url
        description: "URL исходного JSON-файла."
      - name: file_hash
        description: "Хэш исходного файла."
      - name: loaded_at
        description: "Дата и время загрузки raw payload в PostgreSQL."
      - name: record_index
        description: "Порядковый номер заказа внутри массива orders[] исходного JSON."
      - name: order_flow
        description: "Тип order-потока: fbs, dbs, dbw, pickup."
      - name: order_kind
        description: "Группа состояния файла: new, current, archive, completed."
      - name: is_archive
        description: "Флаг архивного набора заказов."
      - name: order_code
        description: "Дополнительный код заказа, если присутствует в источнике."
      - name: office_id
        description: "ID офиса/точки, если присутствует в источнике."
      - name: delivery_service
        description: "Служба доставки, если присутствует в источнике."
      - name: pay_mode
        description: "Способ оплаты, если присутствует в источнике."
      - name: raw_record
        description: "Исходный JSON-объект одного заказа без потери структуры."
      - name: order_id
        description: "ID сборочного задания WB. Идентификатор сборочного задания или заказа в API Wildberries. В разных методах может приходить как orderId, orderID или id. EN: Assembly order ID / order ID in Wildberries API. Semantic type: order_identifier."
      - name: rid
        description: "Уникальный ID заказа WB. Уникальный идентификатор заказа Wildberries. Используется для связи заказов с продажами, возвратами, отчётами и финансовыми детализациями. В ряде методов WB этому же смыслу соответствует поле srid. EN: Unique order ID. In several WB reports and finance methods, srid corresponds to rid. Semantic type: order_identifier."
        data_tests:
          - not_null
      - name: srid
        description: "Уникальный ID заказа WB в отчётах. Идентификатор заказа в отчётах и финансовых методах WB. Для Marketplace API по смыслу соответствует rid из методов сборочных заданий. EN: Order ID in WB reports and finance methods. In Marketplace API responses, srid corresponds to rid. Semantic type: order_identifier."
      - name: order_uid
        description: "ID корзины / транзакции. Идентификатор транзакции для группировки сборочных заданий. Заказы из одной корзины покупателя могут иметь одинаковый orderUid. EN: Transaction/cart ID for grouping assembly orders. Orders in the same buyer cart can have the same orderUid. Semantic type: cart_identifier."
      - name: nm_id
        description: "Артикул WB / номер товара WB. Номенклатурный номер товара Wildberries. Используется для связи заказа с карточкой товара, остатками, аналитикой, рекламой и отчётами. EN: WB item number / Wildberries article number. Semantic type: product_identifier."
        data_tests:
          - not_null
      - name: chrt_id
        description: "ID размера / характеристики товара. Идентификатор размера или характеристики товара в системе Wildberries. Используется для различения вариантов одного товара. EN: Size ID / item characteristic ID in WB systems. Semantic type: product_variant_identifier."
        data_tests:
          - not_null
      - name: article
        description: "Артикул продавца. Артикул товара у продавца. Используется продавцом для внутренней идентификации товара. EN: Seller item number / seller article. Semantic type: seller_product_identifier."
      - name: barcode
        description: "Баркод / штрихкод. Баркод товара или закодированное значение стикера, в зависимости от метода WB. В core.orders используется как идентификатор товарной единицы из заказа. EN: Barcode or encoded sticker value depending on the WB method. Semantic type: product_barcode."
      - name: skus
        description: "Список SKU / баркодов. Массив SKU или баркодов товарной единицы в заказе. EN: Item SKU/barcode array. Semantic type: product_barcode_array."
      - name: warehouse_id
        description: "ID склада. Идентификатор склада, связанного с заказом. В зависимости от метода может означать склад продавца, склад приёмки или склад отгрузки. EN: Warehouse ID related to the order. Semantic type: warehouse_identifier."
      - name: delivery_type
        description: "Тип доставки. Тип доставки заказа. Для наших mock-данных используется словарь: fbs, dbs, edbs, dbsPickupPoint, dbw, pickupPoint, selfPickup. EN: Delivery type. In mock data: fbs, dbs, edbs, dbsPickupPoint, dbw, pickupPoint, selfPickup. Semantic type: delivery_type."
        data_tests:
          - accepted_values:
              arguments:
                values: ['fbs', 'dbs', 'edbs', 'dbsPickupPoint', 'dbspickuppoint', 'dbw', 'pickupPoint', 'pickuppoint', 'selfPickup', 'selfpickup']
      - name: delivery_method
        description: "Метод доставки / модель продажи. Метод доставки или модель продажи. В финансовых отчётах WB описывает sales model and item type. EN: Delivery method / sales model and item type. Semantic type: delivery_method."
      - name: price
        description: "Цена заказа. Цена в валюте продажи с учётом скидок, кроме скидки WB Кошелька. В order API значения часто умножены на 100. EN: Price in sale currency including discounts except WB Wallet discount. In order APIs values are often multiplied by 100. Semantic type: money_amount."
      - name: sale_price
        description: "Цена продавца со скидкой. Цена продавца в валюте продажи с учётом скидки продавца, без учёта скидки WB Клуба. В order API значения часто умножены на 100. EN: Seller price in sale currency including seller discount, excluding WB Club discount. Often multiplied by 100. Semantic type: money_amount."
      - name: final_price
        description: "Итоговая сумма к оплате покупателем. Сумма к оплате покупателем в валюте продажи с учётом всех скидок. В order API значения часто умножены на 100. EN: Final amount charged to the buyer in sale currency including all discounts. Often multiplied by 100. Semantic type: money_amount."
      - name: converted_price
        description: "Цена в валюте страны продавца. Цена в валюте страны продавца с учётом скидок, кроме скидки WB Кошелька. В order API значения часто умножены на 100. EN: Price in seller country currency including discounts except WB Wallet discount. Often multiplied by 100. Semantic type: money_amount."
      - name: converted_final_price
        description: "Итоговая сумма в валюте страны продавца. Сумма к оплате покупателем в валюте страны продавца с учётом всех скидок. В order API значения часто умножены на 100. EN: Final amount charged to the buyer in seller country currency including all discounts. Often multiplied by 100. Semantic type: money_amount."
      - name: currency_code
        description: "Код валюты. Код валюты продажи. EN: Sale currency code. Semantic type: currency_code."
      - name: created_at
        description: "Дата и время создания заказа. Дата и время создания заказа или сборочного задания. EN: Order or assembly task creation date and time. Semantic type: event_timestamp."
