version: 2
models:
- name: finance_balance_cleaned
  description: Очищенная staging-модель `finance_balance`. Данные берутся из `quarantine.v_finance_balance_for_cleaned` после единого row quarantine.
    Сохраняет endpoint-level структуру и technical/quality поля. Это trusted staging слой, а не финальная нормализованная core-сущность.
  columns:
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: currency
    description: 'Currency JSON path: `currency`. Dataset: `finance_balance`.'
  - name: current
    description: 'Current seller balance JSON path: `current`. Dataset: `finance_balance`.'
  - name: for_withdraw
    description: 'The money that can be withdrawn now JSON path: `for_withdraw`. Dataset: `finance_balance`.'
  - name: issue_count
    description: Общее количество найденных row-quality нарушений по строке.
  - name: bad_issue_count
    description: Количество критических bad-нарушений по строке.
  - name: warning_issue_count
    description: Количество warning-предупреждений по строке.
  - name: quality_status
    description: 'Итоговый статус качества строки: good, partial или bad.'
  - name: quality_issues
    description: Массив кодов критических bad-нарушений.
  - name: warning_issues
    description: Массив кодов warning-предупреждений.
  - name: can_load_to_cleaned
    description: Флаг, показывающий, что строка прошла row quarantine и разрешена к загрузке в staging_cleaned.
