version: 2
models:
- name: tariffs_commission_cleaned
  description: Очищенная staging-модель `tariffs_commission`. Данные берутся из `quarantine.v_tariffs_commission_for_cleaned` после единого row
    quarantine. Сохраняет endpoint-level структуру и technical/quality поля. Это trusted staging слой, а не финальная нормализованная core-сущность.
  columns:
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: kgvp_booking
    description: 'Commission on the model «Booking», % JSON path: `kgvpBooking`. Dataset: `tariffs_commission`.'
  - name: kgvp_marketplace
    description: 'Commission on the model `FBS`, % JSON path: `kgvpMarketplace`. Dataset: `tariffs_commission`.'
  - name: kgvp_pickup
    description: 'Commission on the model «In-store pickup» (`C&C`), % JSON path: `kgvpPickup`. Dataset: `tariffs_commission`.'
  - name: kgvp_supplier
    description: 'Commission on the models `DBS` and `DBW`, % JSON path: `kgvpSupplier`. Dataset: `tariffs_commission`.'
  - name: kgvp_supplier_express
    description: 'Commission on the model `EDBS`, % JSON path: `kgvpSupplierExpress`. Dataset: `tariffs_commission`.'
  - name: paid_storage_kgvp
    description: 'Commission on the model `FBW`, % JSON path: `paidStorageKgvp`. Dataset: `tariffs_commission`.'
  - name: parent_id
    description: 'Parent category ID JSON path: `parentID`. Dataset: `tariffs_commission`.'
  - name: parent_name
    description: 'Parent category name JSON path: `parentName`. Dataset: `tariffs_commission`.'
  - name: subject_id
    description: 'Subcategory ID JSON path: `subjectID`. Dataset: `tariffs_commission`.'
  - name: subject_name
    description: 'Subcategory name JSON path: `subjectName`. Dataset: `tariffs_commission`.'
  - name: issue_count
    description: Общее количество найденных row-quality нарушений по строке.
  - name: bad_issue_count
    description: Количество критических bad-нарушений по строке.
  - name: warning_issue_count
    description: Количество warning-предупреждений по строке.
  - name: quality_status
    description: 'Итоговый статус качества строки: good, partial или bad.'
  - name: quality_issues
    description: Массив кодов критических bad-нарушений.
  - name: warning_issues
    description: Массив кодов warning-предупреждений.
  - name: can_load_to_cleaned
    description: Флаг, показывающий, что строка прошла row quarantine и разрешена к загрузке в staging_cleaned.
