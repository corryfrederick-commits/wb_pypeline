version: 2
models:
- name: items_stocks_cleaned
  description: Очищенная staging-модель `items_stocks`. Данные берутся из `quarantine.v_items_stocks_for_cleaned` после единого row quarantine.
    Сохраняет endpoint-level структуру и technical/quality поля. Это trusted staging слой, а не финальная нормализованная core-сущность.
  columns:
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: amount
    description: 'Stock JSON path: `amount`. Dataset: `items_stocks`.'
  - name: article
    description: 'Артикул продавца JSON path: `article`. Dataset: `items_stocks`.'
  - name: barcode
    description: 'Закодированное значение стикера JSON path: `barcode`. Dataset: `items_stocks`.'
  - name: chrt_id
    description: 'Size ID JSON path: `chrtId`. Dataset: `items_stocks`.'
  - name: in_way_from_client
    description: 'On way from client JSON path: `inWayFromClient`. Dataset: `items_stocks`.'
  - name: in_way_to_client
    description: 'On way to client JSON path: `inWayToClient`. Dataset: `items_stocks`.'
  - name: nm_id
    description: 'WB item number JSON path: `nmId`. Dataset: `items_stocks`.'
  - name: office_id
    description: 'Office ID JSON path: `officeId`. Dataset: `items_stocks`.'
  - name: quantity
    description: 'Total quantity of items in the package, pieces JSON path: `quantity`. Dataset: `items_stocks`.'
  - name: skus
    description: 'SKU JSON path: `skus`. Dataset: `items_stocks`.'
  - name: vendor_code
    description: 'Seller item number JSON path: `vendorCode`. Dataset: `items_stocks`.'
  - name: warehouse_address
    description: 'Store address (seller warehouse) where the assembly order was received JSON path: `warehouseAddress`. Dataset: `items_stocks`.'
  - name: warehouse_id
    description: 'ID склада продавца, с которого был отгружен товар JSON path: `warehouseId`. Dataset: `items_stocks`.'
  - name: warehouse_name
    description: 'Warehouse name for planned supply JSON path: `warehouseName`. Dataset: `items_stocks`.'
  - name: issue_count
    description: Общее количество найденных row-quality нарушений по строке.
  - name: bad_issue_count
    description: Количество критических bad-нарушений по строке.
  - name: warning_issue_count
    description: Количество warning-предупреждений по строке.
  - name: quality_status
    description: 'Итоговый статус качества строки: good, partial или bad.'
  - name: quality_issues
    description: Массив кодов критических bad-нарушений.
  - name: warning_issues
    description: Массив кодов warning-предупреждений.
  - name: can_load_to_cleaned
    description: Флаг, показывающий, что строка прошла row quarantine и разрешена к загрузке в staging_cleaned.
