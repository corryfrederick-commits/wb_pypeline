version: 2
models:
- name: communications_chats_cleaned
  description: Очищенная staging-модель `communications_chats`. Данные берутся из `quarantine.v_communications_chats_for_cleaned` после единого
    row quarantine. Сохраняет endpoint-level структуру и technical/quality поля. Это trusted staging слой, а не финальная нормализованная core-сущность.
  columns:
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: article
    description: 'Артикул продавца JSON path: `article`. Dataset: `communications_chats`.'
  - name: barcode
    description: 'Закодированное значение стикера JSON path: `barcode`. Dataset: `communications_chats`.'
  - name: chat_id
    description: 'Chat ID JSON path: `chatID`. Dataset: `communications_chats`.'
  - name: chrt_id
    description: 'Size ID JSON path: `chrtId`. Dataset: `communications_chats`.'
  - name: client_name
    description: 'Buyer''s name JSON path: `clientName`. Dataset: `communications_chats`.'
  - name: created_at
    description: 'Creation date and time JSON path: `createdAt`. Dataset: `communications_chats`.'
  - name: good_card_nm_id
    description: 'WB item number JSON path: `goodCard.nmID`. Dataset: `communications_chats`.'
  - name: good_card_price
    description: 'Actual price with all discounts applied. Charged to the buyer JSON path: `goodCard.price`. Dataset: `communications_chats`.'
  - name: good_card_price_currency
    description: 'Currency JSON path: `goodCard.priceCurrency`. Dataset: `communications_chats`.'
  - name: good_card_rid
    description: 'Unique order ID. <br> Note: `rid` corresponds to `srid` in the responses of the methods:   - [Buyers Return Applications](./user-communication#tag/Buyers-Returns/paths/~1api~1v1~1claims/get)   -
      [Orders](./reports#tag/Main-Reports/paths/~1api~1v1~1supplier~1orders/get)   - [Sales](./reports#tag/Main-Reports/paths/~1api~1v1~1supplier~1sales/get)   -
      [Returns and Item Movement Report](./reports#tag/Returns-and-Product-Movement-Report)   - [Details for the Sales Reports by Report ID](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1SalesReportsDetailedReportId)   -
      [Details for the Sales Reports by Period](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1SalesReportsDetailed)   -
      [Details for the Acquiring Expenses Reports by Report ID](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1AcquiringDetailedReportId)   -
      [Details for the Acquiring Expenses Reports by Period](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1AcquiringDetailed)
      JSON path: `goodCard.rid`. Dataset: `communications_chats`.'
  - name: good_card_size
    description: 'Item size (`techSize'' in the listing) JSON path: `goodCard.size`. Dataset: `communications_chats`.'
  - name: id
    description: 'question id JSON path: `id`. Dataset: `communications_chats`.'
  - name: last_message_add_timestamp
    description: 'Time of event occurrence on the server. Unix timestamp format JSON path: `lastMessage.addTimestamp`. Dataset: `communications_chats`.'
  - name: last_message_text
    description: 'question text JSON path: `lastMessage.text`. Dataset: `communications_chats`.'
  - name: nm_id
    description: 'WB item number JSON path: `nmId`. Dataset: `communications_chats`.'
  - name: order_id
    description: 'ID сборочного задания JSON path: `orderId`. Dataset: `communications_chats`.'
  - name: order_uid
    description: 'ID транзакции для группировки сборочных заданий. Сборочные задания в одной корзине покупателя будут иметь одинаковый `orderUid`
      JSON path: `orderUid`. Dataset: `communications_chats`.'
  - name: reply_sign
    description: 'Chat signature. Can be obtained from [chat information](./user-communication#tag/Buyers-Chat/paths/~1api~1v1~1seller~1chats/get)
      or [event data](./user-communication#tag/Buyers-Chat/paths/~1api~1v1~1seller~1events/get) if the event contains the `"isNewChat": true`
      field. JSON path: `replySign`. Dataset: `communications_chats`.'
  - name: rid
    description: 'Unique order ID. <br> Note: `rid` corresponds to `srid` in the responses of the methods:   - [Buyers Return Applications](./user-communication#tag/Buyers-Returns/paths/~1api~1v1~1claims/get)   -
      [Orders](./reports#tag/Main-Reports/paths/~1api~1v1~1supplier~1orders/get)   - [Sales](./reports#tag/Main-Reports/paths/~1api~1v1~1supplier~1sales/get)   -
      [Returns and Item Movement Report](./reports#tag/Returns-and-Product-Movement-Report)   - [Details for the Sales Reports by Report ID](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1SalesReportsDetailedReportId)   -
      [Details for the Sales Reports by Period](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1SalesReportsDetailed)   -
      [Details for the Acquiring Expenses Reports by Report ID](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1AcquiringDetailedReportId)   -
      [Details for the Acquiring Expenses Reports by Period](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1AcquiringDetailed)
      JSON path: `rid`. Dataset: `communications_chats`.'
  - name: skus
    description: 'SKU JSON path: `skus`. Dataset: `communications_chats`.'
  - name: srid
    description: 'Unique order ID for which a item claim was created JSON path: `srid`. Dataset: `communications_chats`.'
  - name: vendor_code
    description: 'Seller item number JSON path: `vendorCode`. Dataset: `communications_chats`.'
  - name: issue_count
    description: Общее количество найденных row-quality нарушений по строке.
  - name: bad_issue_count
    description: Количество критических bad-нарушений по строке.
  - name: warning_issue_count
    description: Количество warning-предупреждений по строке.
  - name: quality_status
    description: 'Итоговый статус качества строки: good, partial или bad.'
  - name: quality_issues
    description: Массив кодов критических bad-нарушений.
  - name: warning_issues
    description: Массив кодов warning-предупреждений.
  - name: can_load_to_cleaned
    description: Флаг, показывающий, что строка прошла row quarantine и разрешена к загрузке в staging_cleaned.
