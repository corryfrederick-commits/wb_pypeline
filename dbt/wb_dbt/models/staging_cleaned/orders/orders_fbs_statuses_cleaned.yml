  - name: srid
    description: 'Unique order ID for which a item claim was created JSON path: `srid`. Dataset: `orders_fbs_statuses`.'
  - name: status
    description: 'Статус генерации стикера:   - `awaitingTrackNumber` — стикер не готов. Ожидается трек-номер от перевозчика.   - `ready` — стикер
