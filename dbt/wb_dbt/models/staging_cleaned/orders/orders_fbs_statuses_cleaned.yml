version: 2
models:
- name: orders_fbs_statuses_cleaned
  description: Очищенная staging-модель `orders_fbs_statuses`. Данные берутся из `quarantine.v_orders_fbs_statuses_for_cleaned` после единого
    row quarantine. Сохраняет endpoint-level структуру и technical/quality поля. Это trusted staging слой, а не финальная нормализованная core-сущность.
