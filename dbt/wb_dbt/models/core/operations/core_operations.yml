  - name: order_status_snapshots
    description: "Core факт-снимок статусов заказов из FBS/DBS/DBW/Pickup status endpoint'ов."
    columns:
      - name: order_status_snapshot_key
        description: "Суррогатный ключ снимка статуса заказа."
        tests:
          - not_null
          - unique
      - name: order_key
        description: "Суррогатный ключ заказа."
        tests:
          - not_null
      - name: order_natural_id
        description: "Натуральный идентификатор заказа."
      - name: source_status_id
        description: "Идентификатор статуса в исходном endpoint."
      - name: order_id
        description: "Числовой идентификатор заказа WB."
      - name: order_uid
        description: "UID заказа."
      - name: rid
        description: "RID заказа."
      - name: srid
        description: "SRID заказа."
      - name: order_flow
        description: "Схема заказа, определённая по status dataset."
      - name: source_status_dataset
        description: "Исходный status dataset."
      - name: status
        description: "Общий статус заказа."
      - name: supplier_status
        description: "Статус заказа у поставщика."
      - name: wb_status
        description: "Статус заказа на стороне WB."
      - name: is_cancellable
        description: "Признак возможности отмены заказа."
      - name: errors
        description: "JSON с ошибками статуса, если источник их передаёт."
      - name: status_created_at
        description: "Дата создания статуса."
      - name: status_updated_at
        description: "Дата обновления статуса."
      - name: status_snapshot_at
        description: "Время получения снимка статуса."
      - name: source_system
        description: "Источник данных."
      - name: source_dataset
        description: "Название исходного cleaned-набора данных."
      - name: source_row_id
        description: "Технический идентификатор исходной строки."
      - name: raw_payload_id
        description: "Идентификатор исходного raw payload."
      - name: record_index
        description: "Номер записи внутри исходного payload."
      - name: source_loaded_at
        description: "Время загрузки исходных данных."
      - name: core_loaded_at
        description: "Время построения core-записи."
