version: 2
models:
- name: order_items
  description: Core таблица товарных строк заказов. Одна строка соответствует одной
    товарной строке заказа.
  columns:
  - name: wb_account_id
    description: Internal Wildberries account identifier assigned at ingestion.
    tests:
    - not_null
  - name: client_id
    description: Internal SaaS client identifier assigned at ingestion.
    tests:
    - not_null
  - name: order_item_key
    description: 'Суррогатный ключ: order item key.'
    tests:
    - not_null
    - unique
  - name: order_key
    description: Суррогатный ключ заказа.
    tests:
    - not_null
    - relationships:
        to: ref('orders')
        field: order_key
        config:
          where: order_key is not null
  - name: order_natural_id
    description: Натуральный идентификатор заказа, собранный из order_uid, srid, rid
      или order_id.
  - name: order_id
    description: Числовой идентификатор заказа WB.
  - name: rid
    description: RID заказа.
  - name: srid
    description: SRID заказа.
  - name: order_uid
    description: UID заказа.
  - name: order_code
    description: Код заказа.
  - name: product_id
    description: Ссылка на товар. Соответствует nm_id.
    tests:
    - relationships:
        to: ref('products')
        field: product_id
        config:
          where: product_id is not null
  - name: nm_id
    description: Идентификатор номенклатуры WB.
  - name: product_variant_id
    description: Ссылка на вариант товара. Соответствует chrt_id.
    tests:
    - relationships:
        to: ref('product_variants')
        field: product_variant_id
        config:
          where: product_variant_id is not null
  - name: chrt_id
    description: Идентификатор характеристики / варианта товара WB.
  - name: article
    description: Артикул товара.
  - name: barcode_value
    description: Значение barcode или SKU.
  - name: skus
    description: JSON-массив SKU / barcode.
  - name: price
    description: Цена.
  - name: sale_price
    description: Цена продажи.
  - name: final_price
    description: Финальная цена.
  - name: converted_price
    description: Цена после конвертации.
  - name: converted_final_price
    description: Финальная цена после конвертации.
  - name: currency_code
    description: Код валюты.
  - name: converted_currency_code
    description: Код валюты после конвертации.
  - name: scan_price
    description: 'Ценовой показатель: scan price.'
  - name: warehouse_id
    description: Идентификатор склада WB.
  - name: office_id
    description: Идентификатор офиса WB.
  - name: order_flow
    description: Схема / поток заказа.
  - name: order_kind
    description: Тип заказа.
  - name: delivery_type
    description: Тип доставки.
  - name: delivery_method
    description: Метод доставки.
  - name: delivery_service
    description: Служба доставки.
  - name: pay_mode
    description: Способ оплаты.
  - name: order_created_at
    description: Дата и время создания заказа.
  - name: delivery_deadline_at
    description: Плановая дата / дедлайн доставки.
  - name: seller_date
    description: Дата продавца из источника.
  - name: source_system
    description: Источник данных.
  - name: source_dataset
    description: Название исходного cleaned-набора данных.
  - name: source_row_id
    description: Технический идентификатор исходной строки.
  - name: raw_payload_id
    description: Идентификатор исходного raw payload.
  - name: record_index
    description: Номер записи внутри исходного payload.
  - name: source_loaded_at
    description: Время загрузки исходных данных.
  - name: core_loaded_at
    description: Время построения core-записи.
- name: order_status_snapshots
  description: Core факт-снимок статусов заказов из status endpoint'ов.
  columns:
  - name: wb_account_id
    description: Internal Wildberries account identifier assigned at ingestion.
    tests:
    - not_null
  - name: client_id
    description: Internal SaaS client identifier assigned at ingestion.
    tests:
    - not_null
  - name: order_status_snapshot_key
    description: 'Суррогатный ключ: order status snapshot key.'
    tests:
    - not_null
    - unique
  - name: order_key
    description: Суррогатный ключ заказа.
    tests:
    - not_null
    - relationships:
        to: ref('orders')
        field: order_key
        config:
          where: order_key is not null
  - name: order_natural_id
    description: Натуральный идентификатор заказа, собранный из order_uid, srid, rid
      или order_id.
  - name: source_status_id
    description: 'Идентификатор: source status id.'
  - name: order_id
    description: Числовой идентификатор заказа WB.
  - name: order_uid
    description: UID заказа.
  - name: rid
    description: RID заказа.
  - name: srid
    description: SRID заказа.
  - name: order_flow
    description: Схема / поток заказа.
  - name: source_status_dataset
    description: 'Поле core-модели: source status dataset.'
  - name: status
    description: Статус.
  - name: supplier_status
    description: Статус у поставщика.
  - name: wb_status
    description: Статус на стороне WB.
  - name: is_cancellable
    description: 'Булевый признак: is cancellable.'
  - name: errors
    description: 'Поле core-модели: errors.'
  - name: status_created_at
    description: 'Дата и время: status created at.'
  - name: status_updated_at
    description: 'Дата и время: status updated at.'
  - name: status_snapshot_at
    description: 'Дата и время: status snapshot at.'
  - name: source_system
    description: Источник данных.
  - name: source_dataset
    description: Название исходного cleaned-набора данных.
  - name: source_row_id
    description: Технический идентификатор исходной строки.
  - name: raw_payload_id
    description: Идентификатор исходного raw payload.
  - name: record_index
    description: Номер записи внутри исходного payload.
  - name: source_loaded_at
    description: Время загрузки исходных данных.
  - name: core_loaded_at
    description: Время построения core-записи.
