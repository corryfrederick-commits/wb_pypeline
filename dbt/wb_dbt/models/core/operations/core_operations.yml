      - name: converted_price
        description: "Цена после конвертации."
      - name: converted_final_price
        description: "Финальная цена после конвертации."
      - name: currency_code
        description: "Код валюты."
      - name: converted_currency_code
        description: "Код валюты после конвертации."
      - name: scan_price
        description: "Цена сканирования / scan price из источника."
      - name: warehouse_id
        description: "Идентификатор склада WB."
      - name: office_id
        description: "Идентификатор офиса WB."
      - name: order_flow
        description: "Схема / поток заказа."
      - name: order_kind
        description: "Тип заказа."
      - name: delivery_type
        description: "Тип доставки."
      - name: delivery_method
        description: "Метод доставки."
      - name: delivery_service
        description: "Служба доставки."
      - name: pay_mode
        description: "Способ оплаты."
      - name: order_created_at
        description: "Дата и время создания заказа."
      - name: delivery_deadline_at
        description: "Плановая дата / дедлайн доставки."
      - name: seller_date
        description: "Дата продавца из источника."
      - name: source_system
        description: "Источник данных."
