- name: stock_balances
  description: Core факт-снимок остатков товаров на складах. Одна строка соответствует
    остатку товара/варианта на складе на момент загрузки данных.
  columns:
  - name: wb_account_id
    description: Internal Wildberries account identifier assigned at ingestion.
    tests:
    - not_null
  - name: client_id
    description: Internal SaaS client identifier assigned at ingestion.
    tests:
    - not_null
  - name: stock_balance_key
    description: 'Суррогатный ключ: stock balance key.'
    tests:
    - not_null
    - unique
  - name: stock_snapshot_date
    description: 'Дата: stock snapshot date.'
  - name: stock_snapshot_at
    description: 'Дата и время: stock snapshot at.'
  - name: product_id
    description: Ссылка на товар. Соответствует nm_id.
    tests:
    - relationships:
        to: ref('products')
        field: product_id
        config:
          where: product_id is not null
  - name: nm_id
    description: Идентификатор номенклатуры WB.
  - name: product_variant_id
    description: Ссылка на вариант товара. Соответствует chrt_id.
    tests:
    - relationships:
        to: ref('product_variants')
        field: product_variant_id
        config:
          where: product_variant_id is not null
  - name: chrt_id
    description: Идентификатор характеристики / варианта товара WB.
  - name: warehouse_natural_id
    description: Единый натуральный идентификатор склада.
  - name: warehouse_key
    description: Суррогатный ключ склада.
    tests:
    - relationships:
        to: ref('warehouses')
        field: warehouse_key
        config:
          where: warehouse_key is not null
  - name: warehouse_id
    description: Идентификатор склада WB.
  - name: office_id
    description: Идентификатор офиса WB.
  - name: warehouse_name
    description: Название склада.
  - name: warehouse_address
    description: Адрес склада.
  - name: barcode_value
    description: Значение barcode или SKU.
  - name: article
    description: Артикул товара.
  - name: vendor_code
    description: Артикул продавца.
  - name: skus
    description: JSON-массив SKU / barcode.
  - name: quantity
