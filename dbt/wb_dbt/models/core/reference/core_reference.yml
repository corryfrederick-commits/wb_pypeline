  - name: nm_id
    description: Идентификатор номенклатуры WB.
  - name: vendor_code
    description: Артикул продавца.
  - name: article
    description: Артикул товара.
  - name: barcode
    description: 'Поле core-модели: barcode.'
  - name: skus
    description: JSON-массив SKU / barcode.
  - name: characteristics
    description: 'Поле core-модели: characteristics.'
  - name: sizes
    description: 'Поле core-модели: sizes.'
  - name: created_at
    description: Дата и время создания записи в источнике.
