version: 2
models:
- name: stg_items_stocks
  description: 'Автоматически сгенерированная staging-модель для dataset items_stocks.
    Главный record path: stocks. Одна строка = одна запись из главного массива JSON.'
  columns:
  - name: wb_account_id
    description: Internal Wildberries account identifier assigned at ingestion.
    tests:
    - not_null
  - name: client_id
    description: Internal SaaS client identifier assigned at ingestion.
    tests:
    - not_null
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация
      начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: amount
    description: 'Stock JSON path: `amount`. Dataset: `items_stocks`.'
  - name: article
    description: 'Артикул продавца JSON path: `article`. Dataset: `items_stocks`.'
  - name: barcode
    description: 'Закодированное значение стикера JSON path: `barcode`. Dataset: `items_stocks`.'
  - name: chrt_id
    description: 'Size ID JSON path: `chrtId`. Dataset: `items_stocks`.'
  - name: in_way_from_client
    description: 'On way from client JSON path: `inWayFromClient`. Dataset: `items_stocks`.'
  - name: in_way_to_client
    description: 'On way to client JSON path: `inWayToClient`. Dataset: `items_stocks`.'
  - name: nm_id
    description: 'WB item number JSON path: `nmId`. Dataset: `items_stocks`.'
  - name: office_id
    description: 'Office ID JSON path: `officeId`. Dataset: `items_stocks`.'
  - name: quantity
    description: 'Total quantity of items in the package, pieces JSON path: `quantity`.
      Dataset: `items_stocks`.'
  - name: skus
    description: 'SKU JSON path: `skus`. Dataset: `items_stocks`.'
  - name: vendor_code
    description: 'Seller item number JSON path: `vendorCode`. Dataset: `items_stocks`.'
  - name: warehouse_address
    description: 'Store address (seller warehouse) where the assembly order was received
      JSON path: `warehouseAddress`. Dataset: `items_stocks`.'
  - name: warehouse_id
    description: 'ID склада продавца, с которого был отгружен товар JSON path: `warehouseId`.
      Dataset: `items_stocks`.'
  - name: warehouse_name
    description: 'Warehouse name for planned supply JSON path: `warehouseName`. Dataset:
      `items_stocks`.'
