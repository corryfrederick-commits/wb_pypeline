version: 2
models:
- name: stg_report_sales
  description: 'Автоматически сгенерированная staging-модель для dataset report_sales.
    Главный record path: $. Одна строка = одна запись из главного массива JSON.'
  columns:
  - name: wb_account_id
    description: Internal Wildberries account identifier assigned at ingestion.
    tests:
    - not_null
  - name: client_id
    description: Internal SaaS client identifier assigned at ingestion.
    tests:
    - not_null
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация
      начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: article
    description: 'Артикул продавца JSON path: `article`. Dataset: `report_sales`.'
  - name: barcode
    description: 'Barcode JSON path: `barcode`. Dataset: `report_sales`.'
  - name: brand
    description: 'Brand JSON path: `brand`. Dataset: `report_sales`.'
  - name: category
    description: 'Category JSON path: `category`. Dataset: `report_sales`.'
  - name: chrt_id
    description: 'Size ID JSON path: `chrtId`. Dataset: `report_sales`.'
  - name: converted_currency_code
    description: 'Код валюты страны продавца JSON path: `convertedCurrencyCode`. Dataset:
      `report_sales`.'
  - name: converted_final_price
    description: 'Сумма к оплате покупателем в валюте страны продавца с учетом всех
      скидок, умноженная на 100. Предоставляется в информационных целях JSON path:
      `convertedFinalPrice`. Dataset: `report_sales`.'
  - name: converted_price
    description: 'Цена в валюте страны продавца с учетом всех скидок, кроме скидки
      по WB Кошельку, умноженная на 100 JSON path: `convertedPrice`. Dataset: `report_sales`.'
  - name: country_name
    description: 'Country JSON path: `countryName`. Dataset: `report_sales`.'
  - name: created_at
    description: 'Creation date and time JSON path: `createdAt`. Dataset: `report_sales`.'
  - name: currency_code
    description: 'Код валюты продажи JSON path: `currencyCode`. Dataset: `report_sales`.'
  - name: date_value
    description: 'Date and time of order. This field equals to `dateFrom` in request
      if `flag=1`. If the time zone is not specified, then Moscow time UTC+3 is taken.
      JSON path: `date`. Dataset: `report_sales`.'
  - name: discount_percent
    description: 'Seller discount, % JSON path: `discountPercent`. Dataset: `report_sales`.'
  - name: final_price
    description: 'Сумма к оплате покупателем в валюте продажи с учетом всех скидок,
      умноженная на 100. Код валюты продажи указан в поле `currencyCode`. Предоставляется
      в информационных целях JSON path: `finalPrice`. Dataset: `report_sales`.'
  - name: finished_price
    description: 'Price with all discounts, except WB Wallet sum JSON path: `finishedPrice`.
      Dataset: `report_sales`.'
  - name: for_pay
    description: 'To transfer to the seller.<br>Data synchronization takes up to 24
      hours, during which time the value `0` can be displayed in the field JSON path:
      `forPay`. Dataset: `report_sales`.'
  - name: g_number
    description: 'Buyer''s cart ID. Orders within a single transaction will have the
      same `gNumber` JSON path: `gNumber`. Dataset: `report_sales`.'
  - name: id
    description: 'Task ID JSON path: `id`. Dataset: `report_sales`.'
  - name: income_id
    description: 'Shipment number JSON path: `incomeID`. Dataset: `report_sales`.'
  - name: is_realization
    description: 'Implementation contract JSON path: `isRealization`. Dataset: `report_sales`.'
  - name: is_supply
    description: 'Supply contract JSON path: `isSupply`. Dataset: `report_sales`.'
  - name: last_change_date
    description: 'Date and time of refreshing info of service. This field corresponds
      to the `dateFrom` parameter in the request if the `flag=0` parameter exist or
      not specified. If the time zone is not specified, then Moscow time UTC+3 is
      taken. JSON path: `lastChangeDate`. Dataset: `report_sales`.'
  - name: nm_id
    description: 'WB item number JSON path: `nmId`. Dataset: `report_sales`.'
  - name: oblast_okrug_name
    description: 'Area JSON path: `oblastOkrugName`. Dataset: `report_sales`.'
  - name: office_id
    description: 'Warehouse ID JSON path: `officeId`. Dataset: `report_sales`.'
  - name: operation_date
    description: 'Дата и время операции в отчёте по продажам. Исходное поле WB JSON:
      `operationDate`. Описание добавлено вручную, потому что в исходном WB YAML для
      этого поля не было description.'
  - name: order_id
    description: 'Assembly order number JSON path: `orderId`. Dataset: `report_sales`.'
  - name: order_uid
    description: 'ID транзакции для группировки сборочных заданий. Сборочные задания
      в одной корзине покупателя будут иметь одинаковый `orderUid` JSON path: `orderUid`.
      Dataset: `report_sales`.'
  - name: payment_sale_amount
    description: 'Discount for payment with WB Wallet, ₽ JSON path: `paymentSaleAmount`.
      Dataset: `report_sales`.'
  - name: price
    description: 'Price including VAT JSON path: `price`. Dataset: `report_sales`.'
  - name: price_with_disc
    description: 'Price with seller discount, including WB Club discount JSON path:
      `priceWithDisc`. Dataset: `report_sales`.'
  - name: region_name
    description: 'Region JSON path: `regionName`. Dataset: `report_sales`.'
  - name: rid
    description: '`Rid` JSON path: `rid`. Dataset: `report_sales`.'
  - name: sale_dt
    description: 'Purchased on JSON path: `saleDt`. Dataset: `report_sales`.'
  - name: sale_id
    description: 'The unique ID of the sale/return.  - `S**********` — sale - `R**********`
      — return (to WB warehouse) JSON path: `saleID`. Dataset: `report_sales`.'
  - name: sale_price
    description: 'Цена продавца в валюте продажи с учётом скидки продавца, без учёта
      скидки WB Клуба, умноженная на 100. Предоставляется в информационных целях JSON
      path: `salePrice`. Dataset: `report_sales`.'
  - name: skus
    description: 'SKU JSON path: `skus`. Dataset: `report_sales`.'
  - name: spp
    description: 'WB discount, % JSON path: `spp`. Dataset: `report_sales`.'
  - name: srid
    description: 'The unique ID of the return order JSON path: `srid`. Dataset: `report_sales`.'
  - name: sticker
    description: 'sticker ID JSON path: `sticker`. Dataset: `report_sales`.'
  - name: subject
    description: 'Subcategory JSON path: `subject`. Dataset: `report_sales`.'
  - name: supplier_article
    description: 'Seller article number JSON path: `supplierArticle`. Dataset: `report_sales`.'
  - name: tech_size
    description: 'Size JSON path: `techSize`. Dataset: `report_sales`.'
  - name: total_price
    description: 'Price without discounts JSON path: `totalPrice`. Dataset: `report_sales`.'
  - name: vendor_code
    description: 'Seller item number JSON path: `vendorCode`. Dataset: `report_sales`.'
  - name: warehouse_address
    description: 'Store address (seller warehouse) where the assembly order was received
      JSON path: `warehouseAddress`. Dataset: `report_sales`.'
  - name: warehouse_id
    description: 'ID склада продавца, с которого был отгружен товар JSON path: `warehouseId`.
      Dataset: `report_sales`.'
  - name: warehouse_name
    description: 'Warehouse name JSON path: `warehouseName`. Dataset: `report_sales`.'
  - name: warehouse_type
    description: 'Type of items storage warehouse:   - `Склад WB` —  WB warehouse   -
      `Склад продавца` — seller warehouse JSON path: `warehouseType`. Dataset: `report_sales`.'
