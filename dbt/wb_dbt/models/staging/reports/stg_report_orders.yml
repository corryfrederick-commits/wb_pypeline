version: 2
models:
- name: stg_report_orders
  description: 'Автоматически сгенерированная staging-модель для dataset report_orders. Главный record path: $. Одна строка = одна запись из главного
    массива JSON.'
  columns:
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: article
    description: 'Артикул продавца JSON path: `article`. Dataset: `report_orders`.'
  - name: barcode
    description: 'Barcode JSON path: `barcode`. Dataset: `report_orders`.'
  - name: brand
    description: 'Brand JSON path: `brand`. Dataset: `report_orders`.'
  - name: cancel_date
    description: 'Date and time for order canceling. If order wasn''t canceled, then `"0001-01-01T00:00:00"`. If the time zone is not specified,
      then Moscow time UTC+3 is taken. JSON path: `cancelDate`. Dataset: `report_orders`.'
  - name: category
    description: 'Category JSON path: `category`. Dataset: `report_orders`.'
  - name: chrt_id
    description: 'Size ID JSON path: `chrtId`. Dataset: `report_orders`.'
  - name: converted_currency_code
    description: 'Код валюты страны продавца JSON path: `convertedCurrencyCode`. Dataset: `report_orders`.'
  - name: converted_final_price
    description: 'Сумма к оплате покупателем в валюте страны продавца с учетом всех скидок, умноженная на 100. Предоставляется в информационных
      целях JSON path: `convertedFinalPrice`. Dataset: `report_orders`.'
  - name: converted_price
    description: 'Цена в валюте страны продавца с учетом всех скидок, кроме скидки по WB Кошельку, умноженная на 100 JSON path: `convertedPrice`.
      Dataset: `report_orders`.'
  - name: country_name
    description: 'Country JSON path: `countryName`. Dataset: `report_orders`.'
  - name: created_at
    description: 'Creation date and time JSON path: `createdAt`. Dataset: `report_orders`.'
  - name: currency_code
    description: 'Код валюты продажи JSON path: `currencyCode`. Dataset: `report_orders`.'
  - name: date_value
    description: 'Date and time of order. This field equals to `dateFrom` in request if `flag=1`. If the time zone is not specified, then Moscow
      time UTC+3 is taken. JSON path: `date`. Dataset: `report_orders`.'
  - name: discount_percent
    description: 'Seller discount, % JSON path: `discountPercent`. Dataset: `report_orders`.'
  - name: final_price
    description: 'Сумма к оплате покупателем в валюте продажи с учетом всех скидок, умноженная на 100. Код валюты продажи указан в поле `currencyCode`.
      Предоставляется в информационных целях JSON path: `finalPrice`. Dataset: `report_orders`.'
  - name: finished_price
    description: 'Price with all discounts, except WB Wallet sum JSON path: `finishedPrice`. Dataset: `report_orders`.'
  - name: g_number
    description: 'Buyer''s cart ID. Orders within a single transaction will have the same `gNumber` JSON path: `gNumber`. Dataset: `report_orders`.'
  - name: id
    description: 'Task ID JSON path: `id`. Dataset: `report_orders`.'
  - name: income_id
    description: 'Shipment number JSON path: `incomeID`. Dataset: `report_orders`.'
  - name: is_cancel
    description: 'Order cancel:  - `true` — the order is cancelled JSON path: `isCancel`. Dataset: `report_orders`.'
  - name: is_realization
    description: 'Implementation contract JSON path: `isRealization`. Dataset: `report_orders`.'
  - name: is_supply
    description: 'Supply contract JSON path: `isSupply`. Dataset: `report_orders`.'
  - name: last_change_date
    description: 'Date and time of refreshing info of service. This field corresponds to the `dateFrom` parameter in the request if the `flag=0`
      parameter exist or not specified. If the time zone is not specified, then Moscow time UTC+3 is taken. JSON path: `lastChangeDate`. Dataset:
      `report_orders`.'
  - name: nm_id
    description: 'WB item number JSON path: `nmId`. Dataset: `report_orders`.'
  - name: oblast_okrug_name
    description: 'Area JSON path: `oblastOkrugName`. Dataset: `report_orders`.'
  - name: office_id
    description: 'Warehouse ID JSON path: `officeId`. Dataset: `report_orders`.'
  - name: operation_date
    description: 'Дата и время операции в отчёте по заказам. Исходное поле WB JSON: `operationDate`. Описание добавлено вручную, потому что в
      исходном WB YAML для этого поля не было description.'
  - name: order_id
    description: 'Assembly order number JSON path: `orderId`. Dataset: `report_orders`.'
  - name: order_uid
    description: 'ID транзакции для группировки сборочных заданий. Сборочные задания в одной корзине покупателя будут иметь одинаковый `orderUid`
      JSON path: `orderUid`. Dataset: `report_orders`.'
  - name: price
    description: 'Price including VAT JSON path: `price`. Dataset: `report_orders`.'
  - name: price_with_disc
    description: 'Price with seller discount, including WB Club discount JSON path: `priceWithDisc`. Dataset: `report_orders`.'
  - name: region_name
    description: 'Region JSON path: `regionName`. Dataset: `report_orders`.'
  - name: rid
    description: '`Rid` JSON path: `rid`. Dataset: `report_orders`.'
  - name: sale_dt
    description: 'Purchased on JSON path: `saleDt`. Dataset: `report_orders`.'
  - name: sale_price
    description: 'Цена продавца в валюте продажи с учётом скидки продавца, без учёта скидки WB Клуба, умноженная на 100. Предоставляется в информационных
      целях JSON path: `salePrice`. Dataset: `report_orders`.'
  - name: skus
    description: 'SKU JSON path: `skus`. Dataset: `report_orders`.'
  - name: spp
    description: 'WB discount, % JSON path: `spp`. Dataset: `report_orders`.'
  - name: srid
    description: 'The unique ID of the return order JSON path: `srid`. Dataset: `report_orders`.'
  - name: sticker
    description: 'sticker ID JSON path: `sticker`. Dataset: `report_orders`.'
  - name: subject
    description: 'Subcategory JSON path: `subject`. Dataset: `report_orders`.'
  - name: supplier_article
    description: 'Seller article number JSON path: `supplierArticle`. Dataset: `report_orders`.'
  - name: tech_size
    description: 'Size JSON path: `techSize`. Dataset: `report_orders`.'
  - name: total_price
    description: 'Price without discounts JSON path: `totalPrice`. Dataset: `report_orders`.'
  - name: vendor_code
    description: 'Seller item number JSON path: `vendorCode`. Dataset: `report_orders`.'
  - name: warehouse_address
    description: 'Store address (seller warehouse) where the assembly order was received JSON path: `warehouseAddress`. Dataset: `report_orders`.'
  - name: warehouse_id
    description: 'ID склада продавца, с которого был отгружен товар JSON path: `warehouseId`. Dataset: `report_orders`.'
  - name: warehouse_name
    description: 'Warehouse name JSON path: `warehouseName`. Dataset: `report_orders`.'
  - name: warehouse_type
    description: 'Type of items storage warehouse:   - `Склад WB` —  WB warehouse   - `Склад продавца` — seller warehouse JSON path: `warehouseType`.
      Dataset: `report_orders`.'
