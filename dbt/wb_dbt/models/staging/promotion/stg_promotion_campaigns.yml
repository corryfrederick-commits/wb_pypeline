version: 2
models:
- name: stg_promotion_campaigns
  description: 'Автоматически сгенерированная staging-модель для dataset promotion_campaigns. Главный record path: adverts. Одна строка = одна
    запись из главного массива JSON.'
  columns:
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер записи внутри главного массива исходного JSON. Нумерация начинается с 1.
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_record
    description: Исходный JSON-объект одной записи без потери структуры.
    data_tests:
    - not_null
  - name: advert_id
    description: 'Campaign ID JSON path: `advertId`. Dataset: `promotion_campaigns`.'
  - name: article
    description: 'Артикул продавца JSON path: `article`. Dataset: `promotion_campaigns`.'
  - name: barcode
    description: 'Закодированное значение стикера JSON path: `barcode`. Dataset: `promotion_campaigns`.'
  - name: bid_type
    description: 'Bid type:   - `unified` — standard bid   - `manual` — custom bid JSON path: `bid_type`. Dataset: `promotion_campaigns`.'
  - name: campaign_id
    description: 'Идентификатор рекламной кампании. Исходное поле WB JSON: `campaignId`. Описание добавлено вручную, потому что в исходном WB
      YAML для этого поля не было description.'
  - name: chrt_id
    description: 'Size ID JSON path: `chrtId`. Dataset: `promotion_campaigns`.'
  - name: id
    description: 'Subcategory ID JSON path: `id`. Dataset: `promotion_campaigns`.'
  - name: nm_id
    description: 'WB item number JSON path: `nmId`. Dataset: `promotion_campaigns`.'
  - name: nm_settings
    description: 'Item settings JSON path: `nm_settings`. Dataset: `promotion_campaigns`.'
  - name: settings_name
    description: 'Campaign name JSON path: `settings.name`. Dataset: `promotion_campaigns`.'
  - name: settings_payment_type
    description: 'Payment type:   - `cpm` — per mille   - `cpc` — per click JSON path: `settings.payment_type`. Dataset: `promotion_campaigns`.'
  - name: settings_placements_recommendations
    description: 'Placement in recommendations   - `false` — disabled   - `true` — enabled JSON path: `settings.placements.recommendations`. Dataset:
      `promotion_campaigns`.'
  - name: settings_placements_search
    description: 'Placement in search:   - `false` — disabled   - `true` — enabled JSON path: `settings.placements.search`. Dataset: `promotion_campaigns`.'
  - name: skus
    description: 'SKU JSON path: `skus`. Dataset: `promotion_campaigns`.'
  - name: status
    description: 'Campaign status JSON path: `status`. Dataset: `promotion_campaigns`.'
  - name: timestamps_created
    description: 'Campaign create time JSON path: `timestamps.created`. Dataset: `promotion_campaigns`.'
  - name: timestamps_deleted
    description: 'Deleted listings JSON path: `timestamps.deleted`. Dataset: `promotion_campaigns`.'
  - name: timestamps_started
    description: 'Campaign launch time JSON path: `timestamps.started`. Dataset: `promotion_campaigns`.'
  - name: timestamps_updated
    description: 'Campaign last update time JSON path: `timestamps.updated`. Dataset: `promotion_campaigns`.'
  - name: vendor_code
    description: 'Seller item number JSON path: `vendorCode`. Dataset: `promotion_campaigns`.'
