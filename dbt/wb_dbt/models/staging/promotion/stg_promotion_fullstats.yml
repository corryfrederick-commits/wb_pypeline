version: 2
models:
- name: stg_promotion_fullstats
  description: Nested staging-модель для dataset promotion_fullstats. Одна строка = одна nm-запись внутри структуры promotion_fullstats[].days[].apps[].nms[].
  columns:
  - name: raw_payload_id
    description: Технический lineage. ID строки из landing.raw_payloads.
    data_tests:
    - not_null
  - name: record_index
    description: Порядковый номер nm-записи внутри raw payload.
    data_tests:
    - not_null
  - name: root_index
    description: Порядковый номер элемента внутри корневого массива promotion_fullstats[].
    data_tests:
    - not_null
  - name: day_index
    description: Порядковый номер элемента внутри массива days[].
    data_tests:
    - not_null
  - name: app_index
    description: Порядковый номер элемента внутри массива apps[].
    data_tests:
    - not_null
  - name: nm_index
    description: Порядковый номер элемента внутри массива nms[].
    data_tests:
    - not_null
  - name: source_system
    description: Система-источник данных.
  - name: dataset_name
    description: Имя исходного dataset/endpoint mock API.
    data_tests:
    - not_null
  - name: source_file
    description: Имя исходного JSON-файла.
  - name: source_url
    description: URL исходного JSON-файла.
  - name: file_hash
    description: Хэш исходного файла.
  - name: loaded_at
    description: Время загрузки raw payload в PostgreSQL.
  - name: raw_root
    description: Исходный JSON-объект корневого элемента promotion_fullstats[].
    data_tests:
    - not_null
  - name: raw_day
    description: Исходный JSON-объект day из массива days[].
    data_tests:
    - not_null
  - name: raw_app
    description: Исходный JSON-объект app из массива apps[].
    data_tests:
    - not_null
  - name: raw_nm
    description: Исходный JSON-объект nm из массива nms[].
    data_tests:
    - not_null
  - name: raw_record
    description: То же, что raw_nm. Унифицированное поле исходной записи для staging.
    data_tests:
    - not_null
  - name: root_advert_id
    description: 'Campaign ID JSON path: `advertId`. Dataset: `promotion_fullstats`.'
  - name: root_article
    description: 'Артикул продавца JSON path: `article`. Dataset: `promotion_fullstats`.'
  - name: root_atbs
    description: 'Number of items added to the cart JSON path: `atbs`. Dataset: `promotion_fullstats`.'
  - name: root_barcode
    description: 'Закодированное значение стикера JSON path: `barcode`. Dataset: `promotion_fullstats`.'
  - name: root_booster_stats
    description: 'Booster statistics JSON path: `boosterStats`. Dataset: `promotion_fullstats`.'
  - name: root_campaign_id
    description: 'Идентификатор рекламной кампании на корневом уровне fullstats. Исходное поле WB JSON: `campaignId`. Описание добавлено вручную,
      потому что в исходном WB YAML для этого поля не было description.'
  - name: root_canceled
    description: 'Cancellations, pcs JSON path: `canceled`. Dataset: `promotion_fullstats`.'
  - name: root_chrt_id
